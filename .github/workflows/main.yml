name: Build & Release jimmyshjj/GFWList2AGH

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Step 1 - Checkout
              uses: actions/checkout@v6
            - name: Step 2 - Build GFWList2AGH
              run: |
                  curl -fsSL "https://jimmyshjj.top/download/dns.conf" -o "dns.conf"
                  bash release.sh
            - name: Step 3 - Release GFWList2AGH
              run: |
                  git config user.name "jimmyshjj"
                  git config user.email "26865145+jimmyshjj@users.noreply.github.com"
                  git add .
                  git diff --staged --quiet || git commit -m "Generated by GitHub Actions"
                  git push --force
